<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Yamamoto | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            font-family: 'Noto Sans JP', sans-serif;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            text-align: center;
            transition: 0.4s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.6);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #00ffff;
            margin-bottom: 25px;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .info p {
            margin: 10px 0;
            border-left: 3px solid #00ffff;
            padding-left: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>YAMAMOTO</h1>
        <div class="subtitle">PERSONAL PROFILE</div>

        <div class="info">
            <p>名前：山本</p>
            <p>趣味：〇〇</p>
            <p>好きなこと：〇〇</p>
            <p>目標：〇〇</p>
        </div>

        <div class="footer">
            "Keep moving forward."
        </div>
    </div>

</body>
</html>
